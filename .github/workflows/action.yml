name: Deploy ai agent app to Cloud Run

on:
  pull_request:
    branches: [ master]
  push:
    branches:
      - master

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    environment: env
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # TODO: remove this after testing
      - name: Check secrets and environment variables
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "GCP_PROJECT_ID: $GCP_PROJECT_ID"
          echo "GCP_SA_KEY: $GCP_SA_KEY"

      - id: 'auth'
        name: Configure GCP credentials
        uses: google-github-actions/auth@v1 
        with:
          workload_identity_provider: 'projects/677706901693/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
          service_account: 'ai-chatbot-owner@ai-chatbot-464615.iam.gserviceaccount.com'
          
      - name: Log in to GCR
        uses: docker/login-action@v1
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}
          
      - name: Build and Push Docker image to GCR
        run: |
          docker build -t us-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/ai-agent-chatbot/ai-agent-chatbot:${{ github.sha }} .
          docker push us-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/ai-agent-chatbot/ai-agent-chatbot:${{ github.sha }}
      
      - name: Deploy to Cloud Run
        run: |
          terraform init -input=true
          terraform state list
          terraform plan -var="image_tag=${{ github.sha }}"
          terraform apply -var="image_tag=${{ github.sha }}" -auto-approve

# us-docker.pkg.dev/psenapati-sample/github-to-cr
